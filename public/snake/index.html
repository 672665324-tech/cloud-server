<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>贪吃蛇 — ISLA LABS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0e1a2b;
      color: #d8e4f0;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      display: flex;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #game-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 0;
    }
    canvas {
      background: #0a1625;
      border: 1px solid rgba(120,180,230,0.1);
      border-radius: 8px;
    }

    /* 右侧面板 */
    #sidebar {
      width: 180px;
      background: rgba(10,20,38,0.9);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(120,180,230,0.12);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      z-index: 10;
      flex-shrink: 0;
      overflow-y: auto;
    }
    #sidebar h3 {
      font-size: 0.75em;
      color: #5a7a9a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stat-box {
      background: rgba(14,28,48,0.7);
      border: 1px solid rgba(120,180,230,0.1);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 10px;
      text-align: center;
    }
    .stat-box .v {
      font-size: 1.8em;
      font-weight: 700;
      color: #7cb8e8;
    }
    .stat-box .t {
      font-size: 0.7em;
      color: #5a7a9a;
      margin-top: 2px;
    }
    .stat-box .v.best { color: #f0a000; }

    .hint {
      font-size: 0.72em;
      color: #4a6a8a;
      line-height: 1.6;
      margin-top: 8px;
    }

    /* 死亡提示 */
    #death-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      cursor: pointer;
    }
    #death-overlay .msg {
      font-size: 2.5em;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 4px;
      animation: shake 0.4s ease;
    }
    #death-overlay .sub {
      font-size: 1.1em;
      color: #8aaccc;
      margin-top: 12px;
    }
    #death-overlay .restart-hint {
      font-size: 0.85em;
      color: #5a7a9a;
      margin-top: 20px;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-6px)}
      50%{transform:translateX(6px)}
      75%{transform:translateX(-4px)}
    }

    /* 开始提示 */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    #start-overlay .title {
      font-size: 3em;
      font-weight: 700;
      color: #7cb8e8;
      letter-spacing: 6px;
      margin-bottom: 16px;
    }
    #start-overlay .sub {
      font-size: 1em;
      color: #8aaccc;
    }

    /* 移动端方向键 */
    #dpad {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      width: 160px;
      height: 160px;
    }
    .dpad-btn {
      position: absolute;
      width: 48px; height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(120,180,230,0.2);
      color: #8aaccc;
      font-size: 1.3em;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(124,184,232,0.25); }
    .dpad-up    { top: 0;  left: 56px; }
    .dpad-down  { top: 112px; left: 56px; }
    .dpad-left  { top: 56px; left: 0; }
    .dpad-right { top: 56px; left: 112px; }

    a.back {
      position: fixed;
      top: 12px;
      left: 16px;
      color: #5a84a0;
      font-size: 0.8em;
      text-decoration: none;
      z-index: 50;
    }
    a.back:hover { color: #7cb8e8; }

    @media (max-width: 768px) {
      #sidebar { width: 92px; padding: 10px 6px; font-size: 0.7em; }
      #dpad { display: block; width: 132px; height: 132px; bottom: 12px; }
      .dpad-btn { width: 42px; height: 42px; border-radius: 10px; }
      .dpad-up    { top: 0;  left: 45px; }
      .dpad-down  { top: 90px; left: 45px; }
      .dpad-left  { top: 45px; left: 0; }
      .dpad-right { top: 45px; left: 90px; }
      .stat-box .v { font-size: 1.3em; }
    }
  </style>
</head>
<body>

<a class="back" href="/">&larr; 返回主页</a>

<div id="game-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="sidebar">
  <h3>统计</h3>
  <div class="stat-box">
    <div class="v" id="score-val">0</div>
    <div class="t">当前分数</div>
  </div>
  <div class="stat-box">
    <div class="v best" id="best-val">0</div>
    <div class="t">最高分</div>
  </div>
  <div class="stat-box">
    <div class="v" id="length-val">3</div>
    <div class="t">蛇身长度</div>
  </div>
  <div class="hint">
    方向键 / WASD 控制方向<br>
    空格键 暂停<br>
    吃食物得分变长
  </div>
</div>

<div id="start-overlay">
  <div class="title">贪吃蛇</div>
  <div class="sub">点击或按任意键开始</div>
</div>

<div id="death-overlay">
  <div class="msg">你死了</div>
  <div class="sub" id="death-score"></div>
  <div class="restart-hint">点击或按任意键重新开始</div>
</div>

<!-- 移动端方向键 -->
<div id="dpad">
  <div class="dpad-btn dpad-up" data-dir="up">▲</div>
  <div class="dpad-btn dpad-down" data-dir="down">▼</div>
  <div class="dpad-btn dpad-left" data-dir="left">◀</div>
  <div class="dpad-btn dpad-right" data-dir="right">▶</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const startOverlay = document.getElementById('start-overlay');
  const deathOverlay = document.getElementById('death-overlay');
  const deathScore = document.getElementById('death-score');
  const scoreVal = document.getElementById('score-val');
  const bestVal = document.getElementById('best-val');
  const lengthVal = document.getElementById('length-val');

  // ===== Constants =====
  const GRID_W = 40, GRID_H = 30;
  const TICK_MS = 120; // ms per game tick
  const INITIAL_LENGTH = 3;

  // ===== Game State =====
  let snake = [];
  let food = null;
  let direction = 'right';
  let dirQueue = [];
  let score = 0;
  let bestScore = parseInt(localStorage.getItem('snake_best') || '0', 10);
  let state = 'start'; // start | playing | paused | dead
  let tickTimer = null;

  bestVal.textContent = bestScore;

  // ===== Rendering =====
  let layoutData = { w: 640, h: 480, cellW: 16, cellH: 16 };

  function layout() {
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const maxW = window.innerWidth - (isMobile ? 104 : 184);
    const maxH = window.innerHeight - 8;
    const idealW = GRID_W * 16;
    const idealH = GRID_H * 16;
    const scale = Math.min(maxW / idealW, maxH / idealH, 1.5);
    const w = Math.floor(idealW * scale);
    const h = Math.floor(idealH * scale);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    layoutData = { w, h, cellW: w / GRID_W, cellH: h / GRID_H };
  }

  function relayout() { layout(); }
  window.addEventListener('resize', relayout);
  relayout();

  // ===== Game Logic =====
  function spawn() {
    snake = [];
    const startX = Math.floor(GRID_W / 2);
    const startY = Math.floor(GRID_H / 2);
    for (let i = 0; i < INITIAL_LENGTH; i++) {
      snake.push({ x: startX - i, y: startY });
    }
    direction = 'right';
    dirQueue = [];
    score = 0;
    spawnFood();
    updateUI();
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    const free = [];
    for (let x = 0; x < GRID_W; x++) {
      for (let y = 0; y < GRID_H; y++) {
        if (!occupied.has(x + ',' + y)) free.push({ x, y });
      }
    }
    if (free.length === 0) { win(); return; }
    food = free[Math.floor(Math.random() * free.length)];
  }

  function tick() {
    // Process direction queue
    if (dirQueue.length > 0) {
      const next = dirQueue.shift();
      if (!isOpposite(direction, next)) {
        direction = next;
      }
    }

    // Move
    const head = snake[0];
    const dx = direction === 'right' ? 1 : direction === 'left' ? -1 : 0;
    const dy = direction === 'down' ? 1 : direction === 'up' ? -1 : 0;
    const newHead = { x: head.x + dx, y: head.y + dy };

    // Wall collision
    if (newHead.x < 0 || newHead.x >= GRID_W || newHead.y < 0 || newHead.y >= GRID_H) {
      die(); return;
    }

    // Self collision
    for (const seg of snake) {
      if (seg.x === newHead.x && seg.y === newHead.y) {
        die(); return;
      }
    }

    snake.unshift(newHead);

    // Eat food
    if (food && newHead.x === food.x && newHead.y === food.y) {
      score += 10;
      spawnFood();
    } else {
      snake.pop();
    }

    updateUI();
  }

  function isOpposite(a, b) {
    return (a === 'up' && b === 'down') || (a === 'down' && b === 'up') ||
           (a === 'left' && b === 'right') || (a === 'right' && b === 'left');
  }

  function die() {
    state = 'dead';
    clearInterval(tickTimer);
    tickTimer = null;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('snake_best', String(bestScore));
      bestVal.textContent = bestScore;
    }
    deathScore.textContent = `得分: ${score}  |  长度: ${snake.length}`;
    deathOverlay.style.display = 'flex';
  }

  function win() {
    // Extremely unlikely, but handle it
    die();
  }

  function updateUI() {
    scoreVal.textContent = score;
    lengthVal.textContent = snake.length;
  }

  function startGame() {
    state = 'playing';
    startOverlay.style.display = 'none';
    deathOverlay.style.display = 'none';
    spawn();
    tickTimer = setInterval(tick, TICK_MS);
    render();
  }

  // ===== Controls =====
  function queueDir(dir) {
    if (state !== 'playing') return;
    // Check against last queued direction (or current if queue empty)
    const lastDir = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : direction;
    if (!isOpposite(lastDir, dir) && dir !== lastDir) {
      if (dirQueue.length < 3) dirQueue.push(dir);
    }
  }

  window.addEventListener('keydown', (e) => {
    if (state === 'start') { startGame(); return; }
    if (state === 'dead') { startGame(); return; }

    const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                  w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right' };
    if (map[e.key]) { e.preventDefault(); queueDir(map[e.key]); return; }

    if (e.key === ' ' || e.key === 'Escape') {
      e.preventDefault();
      if (state === 'playing') {
        state = 'paused';
        clearInterval(tickTimer);
        tickTimer = null;
      } else if (state === 'paused') {
        state = 'playing';
        tickTimer = setInterval(tick, TICK_MS);
      }
    }
  });

  // Mobile D-pad
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      if (state === 'start') { startGame(); return; }
      if (state === 'dead') { startGame(); return; }
      queueDir(btn.dataset.dir);
    });
  });

  // Click to start/restart
  startOverlay.addEventListener('click', () => { if (state === 'start') startGame(); });
  deathOverlay.addEventListener('click', () => { if (state === 'dead') startGame(); });

  // ===== Rendering =====
  function render() {
    requestAnimationFrame(render);
    const { w, h, cellW, cellH } = layoutData;

    ctx.clearRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(120,180,230,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= GRID_W; x++) {
      ctx.beginPath(); ctx.moveTo(x * cellW, 0); ctx.lineTo(x * cellW, h); ctx.stroke();
    }
    for (let y = 0; y <= GRID_H; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * cellH); ctx.lineTo(w, y * cellH); ctx.stroke();
    }

    // Food
    if (food) {
      const now = Date.now();
      const pulse = 1 + Math.sin(now * 0.005) * 0.2;
      const cx = (food.x + 0.5) * cellW;
      const cy = (food.y + 0.5) * cellH;
      const r = Math.min(cellW, cellH) * 0.35 * pulse;
      ctx.fillStyle = '#f0a000';
      ctx.shadowColor = '#f0a000';
      ctx.shadowBlur = r * 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Snake
    if (snake.length === 0) return;
    const pad = Math.min(cellW, cellH) * 0.08;

    // Body shadow
    ctx.shadowColor = '#4ecca3';
    ctx.shadowBlur = 8;

    for (let i = snake.length - 1; i >= 0; i--) {
      const seg = snake[i];
      const sx = seg.x * cellW + pad;
      const sy = seg.y * cellH + pad;
      const sw = cellW - pad * 2;
      const sh = cellH - pad * 2;
      const r = Math.min(sw, sh) * 0.4;

      if (i === 0) {
        // Head
        ctx.fillStyle = '#4ecca3';
        ctx.beginPath();
        ctx.roundRect(sx - 1, sy - 1, sw + 2, sh + 2, r + 1);
        ctx.fill();
        // Eyes
        ctx.fillStyle = '#fff';
        const eyeR = Math.max(2, sw * 0.18);
        let e1x = 0.65, e1y = 0.3, e2x = 0.65, e2y = 0.7;
        if (snake.length > 1) {
          const dx = snake[0].x - snake[1].x, dy = snake[0].y - snake[1].y;
          e1x = 0.5 + dx * 0.18; e1y = 0.5 + dy * 0.18 + (dx !== 0 ? -0.18 : 0);
          e2x = 0.5 + dx * 0.18; e2y = 0.5 + dy * 0.18 + (dx !== 0 ? 0.18 : 0);
        }
        ctx.beginPath(); ctx.arc(sx + sw * e1x, sy + sh * e1y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + sw * e2x, sy + sh * e2y, eyeR, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#111';
        const pr = eyeR * 0.55;
        ctx.beginPath(); ctx.arc(sx + sw * e1x, sy + sh * e1y, pr, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(sx + sw * e2x, sy + sh * e2y, pr, 0, Math.PI * 2); ctx.fill();
      } else {
        const alpha = 1 - i / snake.length * 0.5;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = '#4ecca3';
        ctx.beginPath();
        ctx.roundRect(sx, sy, sw, sh, r);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    ctx.shadowBlur = 0;

    // Pause overlay
    if (state === 'paused') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#4ecca3';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('暂停', w / 2, h / 2);
      ctx.fillStyle = '#8aaccc';
      ctx.font = '16px sans-serif';
      ctx.fillText('按空格键继续', w / 2, h / 2 + 30);
    }
  }

  // RoundRect polyfill
  if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
      ctx.beginPath();
      ctx.moveTo(x + r.tl, y);
      ctx.lineTo(x + w - r.tr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
      ctx.lineTo(x + w, y + h - r.br);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
      ctx.lineTo(x + r.bl, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
      ctx.lineTo(x, y + r.tl);
      ctx.quadraticCurveTo(x, y, x + r.tl, y);
      ctx.closePath();
    };
  }

  relayout();
  render();
  setInterval(relayout, 2000);
})();
</script>
</body>
</html>
