<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>多人贪吃蛇 — ISLA LABS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      background: #0e1a2b;
      color: #d8e4f0;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      display: flex;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #game-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-width: 0;
    }
    canvas {
      background: #0a1625;
      border: 1px solid rgba(120,180,230,0.1);
      border-radius: 8px;
    }

    /* 右侧面板 */
    #sidebar {
      width: 180px;
      background: rgba(10,20,38,0.9);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(120,180,230,0.12);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      z-index: 10;
      flex-shrink: 0;
      overflow-y: auto;
    }
    #sidebar h3 {
      font-size: 0.75em;
      color: #5a7a9a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 6px;
      border-radius: 6px;
      font-size: 0.85em;
      margin-bottom: 3px;
    }
    .score-item .color {
      width: 10px; height: 10px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .score-item .name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .score-item .pts {
      color: #7cb8e8;
      font-weight: 700;
      min-width: 24px;
      text-align: right;
    }
    .score-item.dead { opacity: 0.4; }
    .score-item.me { background: rgba(124,184,232,0.06); }

    /* 死亡提示 */
    #death-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.7);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #death-overlay .msg {
      font-size: 2.5em;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 4px;
      animation: shake 0.4s ease;
    }
    #death-overlay .timer {
      font-size: 1.2em;
      color: #8aaccc;
      margin-top: 10px;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-6px)}
      50%{transform:translateX(6px)}
      75%{transform:translateX(-4px)}
    }

    /* 移动端方向键 */
    #dpad {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      width: 160px;
      height: 160px;
    }
    .dpad-btn {
      position: absolute;
      width: 48px; height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(120,180,230,0.2);
      color: #8aaccc;
      font-size: 1.3em;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active { background: rgba(124,184,232,0.25); }
    .dpad-up    { top: 0;  left: 56px; }
    .dpad-down  { top: 112px; left: 56px; }
    .dpad-left  { top: 56px; left: 0; }
    .dpad-right { top: 56px; left: 112px; }

    #conn-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #e94560;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 0.85em;
      font-weight: bold;
      z-index: 999;
      display: none;
    }

    @media (max-width: 768px) {
      #sidebar { width: 92px; padding: 10px 6px; font-size: 0.7em; }
      #dpad { display: block; width: 132px; height: 132px; bottom: 12px; }
      .dpad-btn { width: 42px; height: 42px; border-radius: 10px; }
      .dpad-up    { top: 0;  left: 45px; }
      .dpad-down  { top: 90px; left: 45px; }
      .dpad-left  { top: 45px; left: 0; }
      .dpad-right { top: 45px; left: 90px; }
      .score-item .name { max-width: 45px; }
    }
  </style>
</head>
<body>

<div id="conn-bar">⚠ 连接断开，正在重连...</div>

<div id="game-wrap">
  <canvas id="canvas"></canvas>
</div>

<div id="sidebar">
  <h3>排行榜</h3>
  <div id="score-list"></div>
</div>

<div id="death-overlay">
  <div class="msg">你死了</div>
  <div class="timer" id="respawn-timer"></div>
</div>

<!-- 移动端方向键 -->
<div id="dpad">
  <div class="dpad-btn dpad-up" data-dir="up">▲</div>
  <div class="dpad-btn dpad-down"  data-dir="down">▼</div>
  <div class="dpad-btn dpad-left"  data-dir="left">◀</div>
  <div class="dpad-btn dpad-right"  data-dir="right">▶</div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  const socket = io('/snake', { transports: ['websocket', 'polling'] });
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const connBar = document.getElementById('conn-bar');
  const deathOverlay = document.getElementById('death-overlay');
  const respawnTimer = document.getElementById('respawn-timer');
  const scoreList = document.getElementById('score-list');

  // State
  let prevState = null, currState = null, stateTime = 0;
  let myId = null;
  let isDead = false, deadUntil = 0;
  let myName = '';
  const CELL = 16; // base cell size in pixels, will scale

  // Join
  myName = (prompt('输入昵称', '蛇蛇') || '蛇蛇').slice(0, 8);
  let rejoined = false;
  socket.on('connect', () => { connBar.style.display = 'none'; if (!rejoined) socket.emit('join', { name: myName }); else rejoined = false; });
  socket.on('disconnect', () => { connBar.style.display = 'block'; });
  socket.on('connect_error', () => { connBar.style.display = 'block'; });
  socket.io.on('reconnect', () => { if (myName) { rejoined = true; socket.emit('rejoin', { name: myName }); } });
  socket.on('rejoin-failed', () => { rejoined = false; socket.emit('join', { name: myName }); });

  socket.on('state', (s) => {
    prevState = currState;
    currState = s;
    stateTime = performance.now();
    myId = socket.id;
    updateUI();
  });

  socket.on('you-died', () => { isDead = true; deathOverlay.style.display = 'flex'; });
  socket.on('you-respawned', () => { isDead = false; deathOverlay.style.display = 'none'; });

  function updateUI() {
    if (!currState) return;

    // Death timer
    const me = currState.snakes.find(s => s.id === myId);
    if (me && !me.alive && me.deadUntil) {
      deadUntil = me.deadUntil;
      isDead = true;
      deathOverlay.style.display = 'flex';
    } else if (me && me.alive && isDead) {
      isDead = false;
      deathOverlay.style.display = 'none';
    }

    // Scoreboard
    const sorted = [...currState.snakes].sort((a, b) => b.score - a.score);
    scoreList.innerHTML = '';
    for (const sn of sorted) {
      const div = document.createElement('div');
      div.className = 'score-item' + (sn.alive ? '' : ' dead') + (sn.id === myId ? ' me' : '');
      const color = document.createElement('span');
      color.className = 'color';
      color.style.background = sn.color;
      const name = document.createElement('span');
      name.className = 'name';
      name.textContent = sn.name || '—';
      const pts = document.createElement('span');
      pts.className = 'pts';
      pts.textContent = sn.score;
      div.append(color, name, pts);
      scoreList.appendChild(div);
    }
  }

  // Death countdown tick
  setInterval(() => {
    if (!isDead) return;
    const left = Math.max(0, Math.ceil((deadUntil - Date.now()) / 1000));
    respawnTimer.textContent = left > 0 ? left + ' 秒后复活' : '复活中...';
  }, 200);

  // Controls
  function sendDir(dir) {
    socket.emit('direction', { dir });
  }

  window.addEventListener('keydown', (e) => {
    const map = { ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
                  w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right' };
    if (map[e.key]) { e.preventDefault(); sendDir(map[e.key]); }
  });

  // Mobile D-pad
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('pointerdown', (e) => { e.preventDefault(); sendDir(btn.dataset.dir); });
  });

  // ---- Rendering ----
  function layout() {
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
  const maxW = window.innerWidth - (isMobile ? 104 : 184); // sidebar
    const maxH = window.innerHeight - 8;
    const idealW = GRID_W * CELL;
    const idealH = GRID_H * CELL;
    const scale = Math.min(maxW / idealW, maxH / idealH, 1.5);
    const w = Math.floor(idealW * scale);
    const h = Math.floor(idealH * scale);
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    return { w, h, scale, cellW: w / GRID_W, cellH: h / GRID_H };
  }

  const GRID_W = 40, GRID_H = 30;

  let layoutData = { w: 640, h: 480, scale: 1, cellW: 16, cellH: 16 };
  function relayout() { layoutData = layout(); }
  window.addEventListener('resize', relayout);
  relayout();

  function render() {
    requestAnimationFrame(render);
    if (!currState) return;

    const { w, h, cellW, cellH } = layoutData;
    const elapsed = performance.now() - stateTime;
    const t = Math.min(elapsed / 150, 1);

    ctx.clearRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(120,180,230,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x <= GRID_W; x++) {
      ctx.beginPath(); ctx.moveTo(x * cellW, 0); ctx.lineTo(x * cellW, h); ctx.stroke();
    }
    for (let y = 0; y <= GRID_H; y++) {
      ctx.beginPath(); ctx.moveTo(0, y * cellH); ctx.lineTo(w, y * cellH); ctx.stroke();
    }

    // Food
    const now = Date.now();
    const pulse = 1 + Math.sin(now * 0.005) * 0.2;
    for (const f of currState.food) {
      const cx = (f.x + 0.5) * cellW;
      const cy = (f.y + 0.5) * cellH;
      const r = Math.min(cellW, cellH) * 0.35 * pulse;
      ctx.fillStyle = '#f0a000';
      ctx.shadowColor = '#f0a000';
      ctx.shadowBlur = r * 1.5;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Snakes with interpolation
    const pad = Math.min(cellW, cellH) * 0.08;
    for (const sn of currState.snakes) {
      if (!sn.alive || sn.body.length === 0) continue;

      let body = sn.body;
      if (prevState && t < 1) {
        const prev = prevState.snakes.find(ps => ps.id === sn.id);
        if (prev && prev.body.length === sn.body.length && prev.alive) {
          body = sn.body.map((seg, i) => ({
            x: prev.body[i].x + (seg.x - prev.body[i].x) * t,
            y: prev.body[i].y + (seg.y - prev.body[i].y) * t
          }));
        }
      }

      // Body shadow
      ctx.shadowColor = sn.color;
      ctx.shadowBlur = 8;

      // Draw body segments
      ctx.fillStyle = sn.color;
      for (let i = body.length - 1; i >= 0; i--) {
        const sx = body[i].x * cellW + pad;
        const sy = body[i].y * cellH + pad;
        const sw = cellW - pad * 2;
        const sh = cellH - pad * 2;
        const r = Math.min(sw, sh) * 0.4;
        if (i === 0) {
          // Head — slightly larger
          ctx.fillStyle = sn.color;
          ctx.beginPath();
          ctx.roundRect(sx - 1, sy - 1, sw + 2, sh + 2, r + 1);
          ctx.fill();
          // Eyes
          ctx.fillStyle = '#fff';
          const eyeR = Math.max(2, sw * 0.18);
          const dirs = { right: [0.65, 0.3], left: [0.35, 0.3], up: [0.3, 0.35], down: [0.7, 0.65] };
          // Default eye positions (for right)
          let e1x = 0.65, e1y = 0.3, e2x = 0.65, e2y = 0.7;
          if (body.length > 1) {
            const dx = body[0].x - body[1].x, dy = body[0].y - body[1].y;
            e1x = 0.5 + dx * 0.18; e1y = 0.5 + dy * 0.18 + (dx !== 0 ? -0.18 : 0);
            e2x = 0.5 + dx * 0.18; e2y = 0.5 + dy * 0.18 + (dx !== 0 ? 0.18 : 0);
          }
          ctx.beginPath(); ctx.arc(sx + sw * e1x, sy + sh * e1y, eyeR, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(sx + sw * e2x, sy + sh * e2y, eyeR, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#111';
          const pr = eyeR * 0.55;
          ctx.beginPath(); ctx.arc(sx + sw * e1x, sy + sh * e1y, pr, 0, Math.PI * 2); ctx.fill();
          ctx.beginPath(); ctx.arc(sx + sw * e2x, sy + sh * e2y, pr, 0, Math.PI * 2); ctx.fill();
        } else {
          const alpha = 1 - i / body.length * 0.5;
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.roundRect(sx, sy, sw, sh, r);
          ctx.fill();
          ctx.globalAlpha = 1;
        }
      }
      ctx.shadowBlur = 0;
    }
  }

  // RoundRect polyfill
  if (!ctx.roundRect) {
    ctx.roundRect = function(x, y, w, h, r) {
      if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
      ctx.beginPath();
      ctx.moveTo(x + r.tl, y);
      ctx.lineTo(x + w - r.tr, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
      ctx.lineTo(x + w, y + h - r.br);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
      ctx.lineTo(x + r.bl, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
      ctx.lineTo(x, y + r.tl);
      ctx.quadraticCurveTo(x, y, x + r.tl, y);
      ctx.closePath();
    };
  }

  relayout();
  render();
  setInterval(relayout, 2000);
})();
</script>
</body>
</html>
