<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>共享白板 — ISLA LABS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0e1a2b;
      color: #d8e4f0;
      overflow: hidden;
      height: 100vh;
      height: 100dvh;
      display: flex;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* ---- 左侧工具栏 ---- */
    #toolbar {
      width: 60px;
      background: rgba(10,20,38,0.9);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(120,180,230,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 6px;
      z-index: 10;
      flex-shrink: 0;
    }
    #toolbar button {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.04);
      color: #8aaccc;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #toolbar button:hover { background: rgba(124,184,232,0.15); color: #c8e4f8; }
    #toolbar button.active { border-color: #7cb8e8; background: rgba(124,184,232,0.15); color: #7cb8e8; }
    #toolbar .sep { width: 28px; height: 1px; background: rgba(120,180,230,0.1); margin: 4px 0; flex-shrink: 0; }
    #toolbar input[type=range] {
      writing-mode: vertical-lr;
      direction: rtl;
      height: 100px;
      width: 6px;
      accent-color: #7cb8e8;
      flex-shrink: 0;
    }
    #toolbar .color-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s;
      flex-shrink: 0;
    }
    #toolbar .color-dot:hover { transform: scale(1.15); }
    #toolbar .color-dot.active { border-color: #fff; transform: scale(1.1); }

    #size-label {
      font-size: 10px;
      color: #5a7a9a;
      text-align: center;
      flex-shrink: 0;
    }

    /* ---- 右侧用户栏 ---- */
    #users-panel {
      width: 140px;
      background: rgba(10,20,38,0.9);
      backdrop-filter: blur(12px);
      border-left: 1px solid rgba(120,180,230,0.12);
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 6px;
      z-index: 10;
      flex-shrink: 0;
      overflow-y: auto;
    }
    #users-panel h3 {
      font-size: 0.75em;
      color: #5a7a9a;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85em;
      padding: 4px 8px;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
    }
    .user-chip .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ---- 画布区域 ---- */
    #canvas-wrap {
      flex: 1;
      position: relative;
      cursor: crosshair;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
    }
    canvas {
      display: block;
      background: #111;
      box-shadow: 0 0 80px rgba(120,180,230,0.05);
    }
    #cursor-indicator {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      transform: translate(-50%,-50%);
      display: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* ---- 连接条 ---- */
    #conn-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #e94560;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 0.85em;
      font-weight: bold;
      z-index: 999;
      display: none;
    }

    @media (max-width: 768px) {
      #toolbar { width: 42px; padding: 6px 0; gap: 4px; }
      #toolbar button { width: 32px; height: 32px; font-size: 14px; border-radius: 8px; }
      #toolbar .color-dot { width: 21px; height: 21px; }
      #toolbar input[type=range] { height: 54px; }
      #users-panel { width: 78px; padding: 8px 6px; font-size: 0.7em; }
      .user-chip { padding: 4px 5px; gap: 5px; }
      #users-panel h3 { letter-spacing: 1px; }
    }
  </style>
</head>
<body>

<div id="conn-bar">⚠ 连接断开，正在重连...</div>

<!-- 工具栏 -->
<div id="toolbar">
  <div class="color-dot active" style="background:#fff" data-color="#ffffff"></div>
  <div class="color-dot" style="background:#e94560" data-color="#e94560"></div>
  <div class="color-dot" style="background:#f0a000" data-color="#f0a000"></div>
  <div class="color-dot" style="background:#4ecca3" data-color="#4ecca3"></div>
  <div class="color-dot" style="background:#7cb8e8" data-color="#7cb8e8"></div>
  <div class="color-dot" style="background:#a000f0" data-color="#a000f0"></div>
  <div class="sep"></div>
  <input type="range" id="size-slider" min="1" max="20" value="3" title="笔刷大小">
  <div id="size-label">3px</div>
  <div class="sep"></div>
  <button id="btn-eraser" title="橡皮擦">🧹</button>
  <button id="btn-undo" title="撤销">↩</button>
  <button id="btn-clear" title="清空画布">✕</button>
</div>

<!-- 画布 -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<!-- 用户列表 -->
<div id="users-panel">
  <h3>在线</h3>
  <div id="users-list"></div>
</div>

<div id="cursor-indicator"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function(){
  const socket = io('/whiteboard', { transports: ['websocket', 'polling'] });
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvas-wrap');
  const cursor = document.getElementById('cursor-indicator');
  const connBar = document.getElementById('conn-bar');

  // ---- 状态 ----
  let myColor = '#ffffff';
  let mySize = 3;
  let eraser = false;
  let myName = '';
  const strokes = [];          // 所有笔画（用于重绘）
  let drawing = false;
  let currentStroke = null;    // 正在画的笔画
  let remoteCursors = {};      // {sid: {x,y,color}}
  const remoteStrokes = new Map();
  let strokesChanged = false;
  let cacheCanvas, cacheCtx;

  // ---- 昵称 ----
  myName = (prompt('输入你的昵称', '画手') || '画手').slice(0, 12);

  // ---- Canvas 尺寸 ----
  function resizeCanvas() {
    const w = wrap.clientWidth - 4;
    const h = wrap.clientHeight - 4;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    cacheCanvas = document.createElement('canvas');
    cacheCanvas.width = w * dpr;
    cacheCanvas.height = h * dpr;
    cacheCtx = cacheCanvas.getContext('2d');
    cacheCtx.scale(dpr, dpr);
    strokesChanged = true;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ---- 获取画布坐标 (0-1 相对) ----
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) / rect.width,
      y: (e.clientY - rect.top) / rect.height
    };
  }

  // ---- 重绘全部笔画到缓存 ----
  function redrawCache() {
    if (!cacheCtx) return;
    const w = parseFloat(canvas.style.width);
    const h = parseFloat(canvas.style.height);
    cacheCtx.clearRect(0, 0, w, h);
    for (const s of strokes) {
      if (!s.points || s.points.length < 2) continue;
      cacheCtx.strokeStyle = s.color;
      cacheCtx.lineWidth = s.size;
      cacheCtx.lineCap = 'round';
      cacheCtx.lineJoin = 'round';
      cacheCtx.globalCompositeOperation = s.eraser ? 'destination-out' : 'source-over';
      cacheCtx.beginPath();
      cacheCtx.moveTo(s.points[0].x * w, s.points[0].y * h);
      for (let i = 1; i < s.points.length; i++) {
        cacheCtx.lineTo(s.points[i].x * w, s.points[i].y * h);
      }
      cacheCtx.stroke();
      cacheCtx.globalCompositeOperation = 'source-over';
    }
    strokesChanged = false;
  }

  // ---- Socket 事件 ----
  socket.on('connect', () => {
    connBar.style.display = 'none';
    drawing = false;
    currentStroke = null;
    socket.emit('join', { name: myName });
  });

  socket.on('disconnect', () => {
    connBar.style.display = 'block';
  });

  socket.on('history', (data) => {
    strokes.length = 0;
    remoteStrokes.clear();
    for (const s of data) strokes.push(s);
    strokesChanged = true;
  });

  socket.on('draw-start', (data) => {
    strokes.push(data);
    remoteStrokes.set(data.sid, data);
    strokesChanged = true;
    remoteCursors[data.sid] = { x: data.points[0].x, y: data.points[0].y, color: data.color };
  });

  socket.on('draw-move', (data) => {
    const s = remoteStrokes.get(data.sid);
    if (s) { s.points.push({ x: data.x, y: data.y }); strokesChanged = true; }
    if (remoteCursors[data.sid]) {
      remoteCursors[data.sid].x = data.x;
      remoteCursors[data.sid].y = data.y;
    }
  });

  socket.on('draw-end', (data) => {
    remoteStrokes.delete(data.sid);
    delete remoteCursors[data.sid];
  });

  socket.on('undo', (data) => {
    if (data && data.id) {
      const idx = strokes.findIndex(s => s.id === data.id);
      if (idx !== -1) strokes.splice(idx, 1);
    } else {
      strokes.pop();
    }
    strokesChanged = true;
  });

  socket.on('clear', () => {
    strokes.length = 0;
    remoteStrokes.clear();
    strokesChanged = true;
  });

  // 其他用户的鼠标位置
  socket.on('cursor-move', (data) => {
    remoteCursors[data.sid] = { x: data.x, y: data.y, color: data.color };
  });

  socket.on('cursor-leave', (data) => {
    delete remoteCursors[data.sid];
  });

  socket.on('users', (users) => {
    const list = document.getElementById('users-list');
    list.innerHTML = '';
    for (const u of users) {
      const div = document.createElement('div');
      div.className = 'user-chip';
      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = u.color;
      div.appendChild(dot);
      div.appendChild(document.createTextNode(u.name));
      if (u.id === socket.id) div.style.opacity = '0.6';
      list.appendChild(div);
    }
  });

  // ---- 绘制事件 ----
  canvas.addEventListener('pointerdown', (e) => {
    const pos = getPos(e);
    drawing = true;
    const color = eraser ? '#000' : myColor;
    currentStroke = { color, size: eraser ? mySize * 4 : mySize, points: [pos], eraser };
    strokes.push(currentStroke);
    socket.emit('draw-start', { color, size: eraser ? mySize * 4 : mySize, x: pos.x, y: pos.y, eraser });
    strokesChanged = true;
    canvas.setPointerCapture(e.pointerId);
  });

  window.addEventListener('pointermove', (e) => {
    const pos = getPos(e);
    socket.volatile.emit('cursor-move', { x: pos.x, y: pos.y, color: myColor });

    if (!drawing) return;
    currentStroke.points.push(pos);
    socket.emit('draw-move', { x: pos.x, y: pos.y });
    strokesChanged = true;
  });

  window.addEventListener('pointerup', (e) => {
    if (!drawing) return;
    drawing = false;
    // 把完整笔画存到 strokes（draw-start 已经 push 了一个占位）
    if (currentStroke && currentStroke.points.length > 1) {
      // 替换服务端的引用：我们直接 push 到本地 strokes，服务端也已 push
    }
    socket.emit('draw-end', {});
    socket.emit('cursor-leave', {});
    currentStroke = null;
  });

  canvas.addEventListener('pointerleave', () => {
    socket.emit('cursor-leave', {});
  });

  canvas.addEventListener('pointerenter', (e) => {
    if (!drawing) {
      const pos = getPos(e);
      socket.volatile.emit('cursor-move', { x: pos.x, y: pos.y, color: myColor });
    }
  });

  // ---- 渲染循环：缓存笔画 + 远程光标 ----
  let cursorFrame;
  function renderLoop() {
    if (strokesChanged) redrawCache();
    const w = parseFloat(canvas.style.width);
    const h = parseFloat(canvas.style.height);
    ctx.clearRect(0, 0, w, h);
    if (cacheCanvas) ctx.drawImage(cacheCanvas, 0, 0, w, h);
    // Remote cursors
    if (Object.keys(remoteCursors).length > 0) {
      ctx.save();
      for (const c of Object.values(remoteCursors)) {
        const x = c.x * w, y = c.y * h;
        ctx.fillStyle = c.color;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();
    }
    cursorFrame = requestAnimationFrame(renderLoop);
  }
  renderLoop();

  // ---- 工具栏交互 ----
  document.querySelectorAll('.color-dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
      myColor = dot.dataset.color;
      eraser = false;
      document.getElementById('btn-eraser').classList.remove('active');
    });
  });

  const sizeSlider = document.getElementById('size-slider');
  const sizeLabel = document.getElementById('size-label');
  sizeSlider.addEventListener('input', () => {
    mySize = parseInt(sizeSlider.value);
    sizeLabel.textContent = mySize + 'px';
  });

  document.getElementById('btn-eraser').addEventListener('click', function() {
    eraser = !eraser;
    this.classList.toggle('active', eraser);
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  });

  document.getElementById('btn-undo').addEventListener('click', () => {
    socket.emit('undo', {});
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    if (confirm('确定要清空画布吗？')) {
      socket.emit('clear', {});
    }
  });

  // ---- 键盘快捷键 ----
  window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      socket.emit('undo', {});
    }
  });

  // ---- 连接状态 ----
  setInterval(() => {
    if (!socket.connected) connBar.style.display = 'block';
  }, 3000);
})();
</script>
</body>
</html>
